clickhouse.table.dm.song.hot=dm_song_hot_10s
clickhouse.table.dm.singer.hot=dm_singer_hot_10s
clickhouse.table.dm.region.user.login=dm_region_user_login_10s
clickhouse.table.dm.region.revenue=dm_region_revenue_10s

# ==================== 高德API配置 ====================
amap.web.api.key=b1658d6af99529f3dcc0fe084b32f25f
amap.batch.size=10

# ==================== MySQL配置 ====================
mysql.url=jdbc:mysql://localhost:3306/music_db?useSSL=false&serverTimezone=UTC
